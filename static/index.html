<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Warehouse Admin</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="bg-grid" aria-hidden="true"></div>
	<main class="layout">
		<header class="topbar">
			<div>
				<p class="eyebrow">Sports Warehouse</p>
				<h1>Inventory Admin</h1>
			</div>
			<button id="refreshButton" class="refresh-btn" type="button">Refresh</button>
		</header>

		<section class="stats" aria-label="Inventory summary">
			<article class="stat-card">
				<h2>Total Products</h2>
				<p id="totalProducts">0</p>
			</article>
			<article class="stat-card">
				<h2>Total Units</h2>
				<p id="totalUnits">0</p>
			</article>
			<article class="stat-card">
				<h2>Inventory Value</h2>
				<p id="inventoryValue">$0.00</p>
			</article>
		</section>

		<section class="create-shell" aria-label="Add new product">
			<div class="create-toolbar">
				<h2>add product</h2>
			</div>
			<form id="createItemForm" class="create-form">
				<label>
					<span>ID (optional)</span>
					<input id="itemId" name="id" type="number" min="1" placeholder="Auto-generated if empty">
				</label>
				<label>
					<span>Name</span>
					<input id="itemName" name="item_name" type="text" required>
				</label>
				<label>
					<span>Category</span>
					<input id="itemCategory" name="category" type="text" required>
				</label>
				<label>
					<span>Quantity</span>
					<input id="itemQuantity" name="quantity" type="number" min="0" required>
				</label>
				<label>
					<span>Unit Price</span>
					<input id="itemPrice" name="unit_price" type="number" min="0" step="0.01" required>
				</label>
				<label>
					<span>Supplier (optional)</span>
					<input id="itemSupplier" name="supplier" type="text">
				</label>
				<label>
					<span>Last Restocked (optional)</span>
					<input id="itemRestocked" name="last_restocked" type="date">
				</label>
				<button id="createButton" class="create-btn" type="submit">Add Item</button>
			</form>
		</section>

		<section id="editShell" class="create-shell is-hidden" aria-label="Edit product">
			<div class="create-toolbar">
				<h2>edit product</h2>
			</div>
			<form id="editItemForm" class="create-form">
				<label>
					<span>ID</span>
					<input id="editItemId" name="id" type="number" min="1" readonly required>
				</label>
				<label>
					<span>Name</span>
					<input id="editItemName" name="item_name" type="text" required>
				</label>
				<label>
					<span>Category</span>
					<input id="editItemCategory" name="category" type="text" required>
				</label>
				<label>
					<span>Quantity</span>
					<input id="editItemQuantity" name="quantity" type="number" min="0" required>
				</label>
				<label>
					<span>Unit Price</span>
					<input id="editItemPrice" name="unit_price" type="number" min="0" step="0.01" required>
				</label>
				<label>
					<span>Supplier (optional)</span>
					<input id="editItemSupplier" name="supplier" type="text">
				</label>
				<label>
					<span>Last Restocked (optional)</span>
					<input id="editItemRestocked" name="last_restocked" type="date">
				</label>
				<div class="form-actions">
					<button id="saveEditButton" class="create-btn" type="submit">Save Changes</button>
					<button id="cancelEditButton" class="secondary-btn" type="button">Cancel</button>
				</div>
			</form>
		</section>

		<section class="table-shell" aria-label="Products table">
			<div class="table-toolbar">
				<h2>products</h2>
				<p id="statusText" class="status">Loading inventory...</p>
			</div>
			<div class="table-wrap">
				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Name</th>
							<th>Category</th>
							<th>Quantity</th>
							<th>Price</th>
							<th>Supplier</th>
							<th>Last Restocked</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody id="inventoryBody"></tbody>
				</table>
			</div>
		</section>
	</main>

	<script src="script.js" defer></script>
</body>
</html>
